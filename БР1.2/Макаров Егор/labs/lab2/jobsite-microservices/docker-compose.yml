services:
  postgres:
    image: postgres:16-alpine
    container_name: ms-postgres
    environment:
      POSTGRES_USER: jobsite
      POSTGRES_PASSWORD: jobsite
      POSTGRES_DB: jobsite
    ports:
      - "5440:5432"
    volumes:
      - ms-pgdata:/var/lib/postgresql/data
      - ./init-dbs.sql:/docker-entrypoint-initdb.d/init-dbs.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U jobsite"]
      interval: 5s
      timeout: 5s
      retries: 10

  # ---- общие переменные окружения через якорь ----
  auth:
    build: .
    image: jobsite-ms
    environment:
      <<: &svc-env
        DB_HOST: postgres
        DB_PORT: 5432
        DB_USER: jobsite
        DB_PASSWORD: jobsite
        JWT_ACCESS_SECRET: shared_access_secret
        JWT_REFRESH_SECRET: shared_refresh_secret
        INTERNAL_TOKEN: internal-secret
        AUTH_URL: http://auth:3001
        CATALOG_URL: http://catalog:3002
        SEEKER_URL: http://seeker:3003
        EMPLOYER_URL: http://employer:3004
        VACANCY_URL: http://vacancy:3005
        APPLICATION_URL: http://application:3006
      SERVICE: auth
      PORT: 3001
      DB_NAME: auth_db
    depends_on:
      postgres: { condition: service_healthy }
    ports: ["3001:3001"]

  catalog:
    image: jobsite-ms
    environment:
      <<: *svc-env
      SERVICE: catalog
      PORT: 3002
      DB_NAME: catalog_db
    depends_on:
      postgres: { condition: service_healthy }
    ports: ["3002:3002"]

  seeker:
    image: jobsite-ms
    environment:
      <<: *svc-env
      SERVICE: seeker
      PORT: 3003
      DB_NAME: seeker_db
    depends_on:
      postgres: { condition: service_healthy }
    ports: ["3003:3003"]

  employer:
    image: jobsite-ms
    environment:
      <<: *svc-env
      SERVICE: employer
      PORT: 3004
      DB_NAME: employer_db
    depends_on:
      postgres: { condition: service_healthy }
    ports: ["3004:3004"]

  vacancy:
    image: jobsite-ms
    environment:
      <<: *svc-env
      SERVICE: vacancy
      PORT: 3005
      DB_NAME: vacancy_db
    depends_on:
      postgres: { condition: service_healthy }
    ports: ["3005:3005"]

  application:
    image: jobsite-ms
    environment:
      <<: *svc-env
      SERVICE: application
      PORT: 3006
      DB_NAME: application_db
    depends_on:
      postgres: { condition: service_healthy }
    ports: ["3006:3006"]

  gateway:
    image: jobsite-ms
    environment:
      <<: *svc-env
      SERVICE: gateway
      PORT: 3000
    depends_on:
      - auth
      - catalog
      - seeker
      - employer
      - vacancy
      - application
    ports: ["3000:3000"]

volumes:
  ms-pgdata:
