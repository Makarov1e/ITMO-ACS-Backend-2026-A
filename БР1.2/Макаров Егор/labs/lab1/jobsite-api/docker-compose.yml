services:
  db:
    image: postgres:16-alpine
    container_name: jobsite-db
    environment:
      POSTGRES_USER: jobsite
      POSTGRES_PASSWORD: jobsite
      POSTGRES_DB: jobsite
    ports:
      - "5433:5432"
    volumes:
      - jobsite-pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U jobsite"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  jobsite-pgdata:
